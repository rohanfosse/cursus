version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    open-pull-requests-limit: 5
    target-branch: dev
    ignore:
      - dependency-name: electron
        update-types:
          - version-update:semver-major
      # electron-vite 3.x ne supporte que vite ^4||^5||^6
      - dependency-name: vite
        update-types:
          - version-update:semver-major
      # eslint-plugin-vue 10+ requiert vue-eslint-parser@^10 non compatible
      - dependency-name: eslint-plugin-vue
        update-types:
          - version-update:semver-major
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    target-branch: dev
