name: Lighthouse

on:
  workflow_dispatch:
  # Desactive sur push/PR — le site externe timeout en CI (NO_FCP).
  # Lancer manuellement via Actions > Lighthouse > Run workflow.
  # push:
  #   branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Audit cursus.school (landing page)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://cursus.school
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json
