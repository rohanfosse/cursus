name: Deploy Web

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist-web/**'
  workflow_dispatch:

# Un seul déploiement à la fois — annule l'ancien si un nouveau arrive
concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: npm run build:web

      - name: Commit dist-web to git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist-web/
          if git diff --cached --quiet; then
            echo "No changes in dist-web, skipping commit"
          else
            git commit -m "chore: build dist-web [skip ci]"
            # Rebase si quelqu'un a pushé entre-temps (runs parallèles)
            git pull --rebase origin main
            git push
          fi

      - name: Trigger deploy webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          SERVER_URL:    ${{ secrets.VITE_SERVER_URL }}
        run: |
          curl -sf -X POST \
            -H "x-deploy-secret: $DEPLOY_SECRET" \
            -H "Content-Type: application/json" \
            "${SERVER_URL}/webhook/deploy" \
            && echo " Deploy webhook OK" \
            || echo " Webhook unreachable (HTTP error)"
