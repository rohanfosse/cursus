services:
  cursus:
    build:
      context: .
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://app.cursus.school}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    container_name: cursus-server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "3001:3001"
    volumes:
      - cursus-db:/data/db
      - cursus-uploads:/data/uploads
      - deploy-signal:/deploy-signal
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://app.cursus.school}
      - DB_PATH=/data/db/cursus.db
      - UPLOAD_DIR=/data/uploads
      - DEPLOY_SECRET=${DEPLOY_SECRET}
      # Cloudflare Turnstile : si absent, le captcha public est skippe.
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      # URL publique utilisee pour generer les liens d'invitation des
      # campagnes booking. Si absent, fallback https://app.cursus.school.
      - SERVER_URL=${SERVER_URL:-https://app.cursus.school}
      # SMTP : si SMTP_HOST est vide, l'envoi de mails est desactive
      # (campagnes lancees -> aucun mail, mais liens copiables manuellement).
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cursus-db:
  cursus-uploads:
  deploy-signal:
