<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursus — Admin Monitor</title>
  <link rel="icon" type="image/png" href="/assets/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08090c; --bg-card: #13151b; --bg-card-hover: #191c24;
      --accent: #4A90D9; --green: #2ECC71; --orange: #F39C12; --red: #E74C3C;
      --text: #e2e4e8; --text-secondary: #8b8f98; --text-muted: #4e5260;
      --border: rgba(255,255,255,.06); --radius: 14px; --radius-sm: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header .status { display: flex; align-items: center; gap: .5rem; font-size: .85rem; color: var(--text-secondary); }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .header .dot.error { background: var(--red); }

    /* ── Login ── */
    .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; width: 360px; }
    .login-box h2 { margin-bottom: 1.5rem; text-align: center; }
    .login-box input { width: 100%; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: .9rem; margin-bottom: .75rem; outline: none; }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button { width: 100%; padding: .75rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 600; cursor: pointer; }
    .login-box button:hover { opacity: .9; }
    .login-box .error-msg { color: var(--red); font-size: .8rem; margin-top: .5rem; text-align: center; }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

    /* ── Cards ── */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .card-title { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: .75rem; }
    .card-value { font-size: 1.8rem; font-weight: 700; line-height: 1.2; }
    .card-sub { font-size: .8rem; color: var(--text-secondary); margin-top: .25rem; }

    /* ── Progress bar ── */
    .bar-bg { height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; margin-top: .75rem; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
    .bar-fill.green { background: var(--green); }
    .bar-fill.orange { background: var(--orange); }
    .bar-fill.red { background: var(--red); }

    /* ── Services ── */
    .svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .svc { display: flex; align-items: center; gap: .5rem; font-size: .85rem; padding: .5rem .75rem; background: var(--bg); border-radius: var(--radius-sm); }
    .svc .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .svc .dot.ok { background: var(--green); }
    .svc .dot.ko { background: var(--red); }

    /* ── PM2 table ── */
    .pm2-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .pm2-table th { text-align: left; color: var(--text-muted); font-weight: 500; padding: .5rem .5rem; border-bottom: 1px solid var(--border); }
    .pm2-table td { padding: .5rem; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: .7rem; font-weight: 600; text-transform: uppercase; }
    .badge.online { background: rgba(46,204,113,.15); color: var(--green); }
    .badge.stopped { background: rgba(231,76,60,.15); color: var(--red); }

    /* ── Certs ── */
    .cert { display: flex; justify-content: space-between; align-items: center; padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
    .cert:last-child { border-bottom: none; }
    .cert-name { font-weight: 500; }
    .cert-exp { color: var(--text-secondary); }

    /* ── Git ── */
    .git-info { font-size: .85rem; line-height: 1.8; }
    .git-info code { background: var(--bg); padding: 2px 8px; border-radius: 4px; font-size: .8rem; }

    /* ── Wide card ── */
    .wide { grid-column: 1 / -1; }

    /* ── Refresh btn ── */
    .refresh-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: .4rem .8rem; border-radius: var(--radius-sm); font-size: .8rem; cursor: pointer; }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Back link ── */
    .back-link { font-size: .85rem; color: var(--text-secondary); }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <h2>Admin Monitor</h2>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="login-password" placeholder="Mot de passe" autocomplete="current-password" />
    <button id="login-btn" onclick="doLogin()">Connexion</button>
    <div id="login-error" class="error-msg" style="display:none"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="container" style="display:none">
  <div class="header">
    <div>
      <a href="/" class="back-link">&larr; Retour au site</a>
      <h1>Monitoring Serveur</h1>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <div class="status"><div id="status-dot" class="dot"></div><span id="status-text">Connecté</span></div>
      <button class="refresh-btn" onclick="refresh()">Rafraîchir</button>
    </div>
  </div>

  <div class="grid" id="metrics-grid">
    <!-- Filled by JS -->
  </div>
</div>

<script>
const API = window.location.origin
let token = localStorage.getItem('admin_token')

// ── Login ──
async function doLogin() {
  const email = document.getElementById('login-email').value
  const pwd   = document.getElementById('login-password').value
  const errEl = document.getElementById('login-error')
  errEl.style.display = 'none'
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd }),
    })
    const json = await r.json()
    if (!json.ok) throw new Error(json.error)
    if (json.data.type !== 'teacher') throw new Error('Accès réservé aux enseignants')
    token = json.data.token
    localStorage.setItem('admin_token', token)
    showDashboard()
  } catch (e) {
    errEl.textContent = e.message
    errEl.style.display = 'block'
  }
}

// Enter key
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })

function showDashboard() {
  document.getElementById('login-overlay').style.display = 'none'
  document.getElementById('dashboard').style.display = 'block'
  refresh()
  setInterval(refresh, 15000) // auto-refresh every 15s
}

// ── Format helpers ──
function fmtBytes(b) {
  if (b == null) return '—'
  if (b < 1024) return b + ' B'
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB'
  return (b / 1073741824).toFixed(1) + ' GB'
}
function fmtDuration(seconds) {
  if (seconds < 60) return Math.floor(seconds) + 's'
  if (seconds < 3600) return Math.floor(seconds / 60) + 'min'
  if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'min'
  return Math.floor(seconds / 86400) + 'j ' + Math.floor((seconds % 86400) / 3600) + 'h'
}
function barColor(pct) { return pct > 85 ? 'red' : pct > 60 ? 'orange' : 'green' }

// ── Fetch & render ──
async function refresh() {
  const dot = document.getElementById('status-dot')
  const txt = document.getElementById('status-text')
  try {
    const r = await fetch(`${API}/api/admin/monitor`, {
      headers: { 'Authorization': `Bearer ${token}` },
    })
    if (r.status === 401 || r.status === 403) {
      localStorage.removeItem('admin_token')
      location.reload()
      return
    }
    const json = await r.json()
    if (!json.ok) throw new Error(json.error)
    dot.className = 'dot'
    txt.textContent = 'Live — ' + new Date().toLocaleTimeString('fr-FR')
    render(json.data)
  } catch (e) {
    dot.className = 'dot error'
    txt.textContent = 'Erreur: ' + e.message
  }
}

function render(d) {
  const grid = document.getElementById('metrics-grid')
  const memPct = d.memory.percent
  const diskPct = d.disk?.percent ?? 0
  const swapPct = d.swap?.total ? Math.round((d.swap.used / d.swap.total) * 100) : 0

  grid.innerHTML = `
    <!-- CPU -->
    <div class="card">
      <div class="card-title">CPU</div>
      <div class="card-value">${d.cpu.usage}%</div>
      <div class="card-sub">${d.cpu.cores} cores — Load: ${d.system.loadAvg.join(' / ')}</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(d.cpu.usage)}" style="width:${d.cpu.usage}%"></div></div>
    </div>

    <!-- RAM -->
    <div class="card">
      <div class="card-title">Mémoire RAM</div>
      <div class="card-value">${fmtBytes(d.memory.used)} <span style="font-size:.9rem;color:var(--text-muted)">/ ${fmtBytes(d.memory.total)}</span></div>
      <div class="card-sub">${memPct}% utilisé — ${fmtBytes(d.memory.free)} libre</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(memPct)}" style="width:${memPct}%"></div></div>
    </div>

    <!-- Disk -->
    <div class="card">
      <div class="card-title">Disque</div>
      <div class="card-value">${fmtBytes(d.disk?.used)} <span style="font-size:.9rem;color:var(--text-muted)">/ ${fmtBytes(d.disk?.total)}</span></div>
      <div class="card-sub">${diskPct}% utilisé — ${fmtBytes(d.disk?.free)} libre</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(diskPct)}" style="width:${diskPct}%"></div></div>
    </div>

    <!-- Swap -->
    <div class="card">
      <div class="card-title">Swap</div>
      <div class="card-value">${d.swap ? fmtBytes(d.swap.used) : 'N/A'} <span style="font-size:.9rem;color:var(--text-muted)">/ ${d.swap ? fmtBytes(d.swap.total) : '—'}</span></div>
      <div class="card-sub">${d.swap ? swapPct + '% utilisé' : 'Aucun swap configuré'}</div>
      ${d.swap ? `<div class="bar-bg"><div class="bar-fill ${barColor(swapPct)}" style="width:${swapPct}%"></div></div>` : ''}
    </div>

    <!-- Uptime -->
    <div class="card">
      <div class="card-title">Uptime Système</div>
      <div class="card-value">${fmtDuration(d.system.uptime)}</div>
      <div class="card-sub">${d.system.hostname} — Node ${d.system.nodeVersion}</div>
    </div>

    <!-- DB & Logs -->
    <div class="card">
      <div class="card-title">Base de données & Logs</div>
      <div class="card-value">${fmtBytes(d.db.size)}</div>
      <div class="card-sub">DB SQLite — Logs: ${fmtBytes(d.logs.size)}</div>
    </div>

    <!-- Services -->
    <div class="card">
      <div class="card-title">Services</div>
      <div class="svc-grid">
        <div class="svc"><div class="dot ${d.services.nginx === 'active' ? 'ok' : 'ko'}"></div>Nginx</div>
        <div class="svc"><div class="dot ${d.services.ssh === 'active' ? 'ok' : 'ko'}"></div>SSH</div>
        <div class="svc"><div class="dot ${d.services.fail2ban === 'active' ? 'ok' : 'ko'}"></div>Fail2ban</div>
        <div class="svc"><div class="dot ${d.services.ufw?.includes('active') ? 'ok' : 'ko'}"></div>UFW</div>
      </div>
      <div class="card-sub" style="margin-top:.75rem">IPs bannies: <strong>${d.security.bannedIPs}</strong></div>
    </div>

    <!-- SSL Certs -->
    <div class="card">
      <div class="card-title">Certificats SSL</div>
      ${d.security.certs.length ? d.security.certs.map(c => `
        <div class="cert">
          <span class="cert-name">${c.name}</span>
          <span class="cert-exp" style="color:${c.valid ? 'var(--green)' : 'var(--red)'}">
            ${c.valid ? '✓' : '✗'} ${c.expiry || '—'}
          </span>
        </div>
      `).join('') : '<div class="card-sub">Aucun certificat détecté</div>'}
    </div>

    <!-- PM2 Processes -->
    <div class="card wide">
      <div class="card-title">Processus PM2</div>
      <table class="pm2-table">
        <tr><th>Nom</th><th>Status</th><th>CPU</th><th>RAM</th><th>Uptime</th><th>Restarts</th><th>PID</th></tr>
        ${d.pm2.map(p => `
          <tr>
            <td><strong>${p.name}</strong></td>
            <td><span class="badge ${p.status}">${p.status}</span></td>
            <td>${p.cpu ?? 0}%</td>
            <td>${fmtBytes(p.memory)}</td>
            <td>${fmtDuration(p.uptime / 1000)}</td>
            <td>${p.restart}</td>
            <td style="color:var(--text-muted)">${p.pid}</td>
          </tr>
        `).join('')}
      </table>
    </div>

    <!-- Git -->
    <div class="card wide">
      <div class="card-title">Déploiement Git</div>
      <div class="git-info">
        Branche: <code>${d.git.branch}</code> &nbsp;
        Commit: <code>${d.git.commit}</code> &nbsp;
        <span style="color:var(--text-secondary)">${d.git.message}</span><br>
        Dernière mise à jour: <span style="color:var(--text-secondary)">${d.git.date || '—'}</span>
      </div>
    </div>
  `
}

// ── Init ──
if (token) {
  showDashboard()
} else {
  document.getElementById('login-overlay').style.display = 'flex'
}
</script>
</body>
</html>
