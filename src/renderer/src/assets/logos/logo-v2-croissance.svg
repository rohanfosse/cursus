<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Logo v2 : Croissance — Le monogramme C/U gagne des flux internes -->
  <defs>
    <linearGradient id="g2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ECBFF"/>
      <stop offset="50%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="g2b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4A90D9"/>
      <stop offset="70%" stop-color="#60B4FF"/>
      <stop offset="100%" stop-color="#60B4FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g2c" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2563EB"/>
      <stop offset="70%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Forme extérieure : C+U monogramme -->
  <!-- Côté gauche du C descendant vers le U -->
  <path d="M310 68
           C195 35, 72 128, 72 256
           C72 372, 148 445, 222 456
           Q256 462, 256 424
           L256 385"
        stroke="url(#g2a)" stroke-width="44" stroke-linecap="round" fill="none"/>
  <!-- Côté droit remontant du U -->
  <path d="M256 385
           L256 424
           Q256 462, 290 456
           C364 445, 440 372, 440 256
           C440 185, 408 130, 365 100"
        stroke="url(#g2a)" stroke-width="44" stroke-linecap="round" fill="none"/>
  <!-- Flux internes : 3 lignes de communication qui traversent le monogramme -->
  <path d="M140 200 Q256 185, 372 200" stroke="url(#g2b)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M120 270 Q256 255, 392 270" stroke="url(#g2c)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M150 340 Q256 325, 362 340" stroke="url(#g2b)" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Point focal -->
  <circle cx="256" cy="400" r="10" fill="#2563EB"/>
  <circle cx="256" cy="400" r="5" fill="#7ECBFF"/>
</svg>
