<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Logo v2 : Croissance - C avec barres de communication -->
  <!-- Phase messagerie/canaux : communication structurée -->
  <defs>
    <linearGradient id="arc-v2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7EB8FF"/>
      <stop offset="50%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2e6dae"/>
    </linearGradient>
    <linearGradient id="bar1-v2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5da3f0"/>
      <stop offset="100%" stop-color="#a8c8f0"/>
    </linearGradient>
    <linearGradient id="bar2-v2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#8ab4e0"/>
    </linearGradient>
    <linearGradient id="bar3-v2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e6dae"/>
      <stop offset="100%" stop-color="#6a9fd4"/>
    </linearGradient>
  </defs>
  <!-- Arc du C -->
  <path d="M300 80 C180 30, 50 100, 50 256 C50 412, 180 482, 300 432"
        stroke="url(#arc-v2)" stroke-width="50" stroke-linecap="round" fill="none"/>
  <!-- 3 barres horizontales - canaux de communication -->
  <rect x="250" y="175" width="190" height="30" rx="15" fill="url(#bar1-v2)"/>
  <rect x="220" y="270" width="210" height="30" rx="15" fill="url(#bar2-v2)"/>
  <rect x="245" y="365" width="160" height="30" rx="15" fill="url(#bar3-v2)"/>
</svg>
