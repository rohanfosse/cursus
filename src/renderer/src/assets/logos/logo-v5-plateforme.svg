<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 620" fill="none">
  <!-- Logo v5 : Plateforme complète - Logo abouti avec typographie -->
  <!-- Phase mature : écosystème éducatif complet -->
  <defs>
    <linearGradient id="arc-v5" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#a0ccff"/>
      <stop offset="30%" stop-color="#7EB8FF"/>
      <stop offset="60%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1e5a96"/>
    </linearGradient>
    <linearGradient id="orbit-v5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EB8FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2e6dae" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glow-v5" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7EB8FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="50%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e6dae"/>
      <stop offset="50%" stop-color="#9B87F5"/>
      <stop offset="100%" stop-color="#2e6dae" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="flow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e5a96"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="text-v5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2e6dae"/>
    </linearGradient>
  </defs>
  <!-- Halo lumineux subtil -->
  <circle cx="256" cy="270" r="200" fill="url(#glow-v5)"/>
  <!-- Cercle englobant partiel (écosystème) -->
  <path d="M410 120 A200 200 0 1 0 410 420"
        stroke="url(#orbit-v5)" stroke-width="3" stroke-linecap="round" fill="none"
        stroke-dasharray="12 8"/>
  <!-- Arc du C principal - plus épais et premium -->
  <path d="M305 95 C185 40, 55 115, 55 270 C55 425, 185 500, 305 445"
        stroke="url(#arc-v5)" stroke-width="52" stroke-linecap="round" fill="none"/>
  <!-- Suggestion de mortier intégrée dans la courbe supérieure -->
  <path d="M260 72 L340 72" stroke="#7EB8FF" stroke-width="22" stroke-linecap="round" opacity="0.5"/>
  <path d="M290 72 L290 52" stroke="#7EB8FF" stroke-width="3" opacity="0.6"/>
  <circle cx="290" cy="47" r="5" fill="#a0ccff" opacity="0.7"/>
  <!-- Lignes de flux internes (savoir qui circule) -->
  <rect x="240" y="195" width="175" height="24" rx="12" fill="url(#flow1)" opacity="0.85"/>
  <rect x="215" y="280" width="190" height="24" rx="12" fill="url(#flow2)" opacity="0.85"/>
  <rect x="240" y="365" width="140" height="24" rx="12" fill="url(#flow3)" opacity="0.85"/>
  <!-- Points de connexion subtils -->
  <circle cx="425" cy="195" r="6" fill="#4A90D9" opacity="0.5"/>
  <circle cx="420" cy="290" r="5" fill="#9B87F5" opacity="0.4"/>
  <circle cx="400" cy="375" r="5" fill="#2ECC71" opacity="0.4"/>
  <!-- Lignes reliant les flux aux points -->
  <line x1="415" y1="207" x2="425" y2="195" stroke="#4A90D9" stroke-width="1.5" opacity="0.3"/>
  <line x1="405" y1="292" x2="420" y2="290" stroke="#9B87F5" stroke-width="1.5" opacity="0.3"/>
  <line x1="380" y1="377" x2="400" y2="375" stroke="#2ECC71" stroke-width="1.5" opacity="0.3"/>
  <!-- Typographie CURSUS -->
  <text x="256" y="560" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="62" font-weight="700" letter-spacing="14"
        fill="url(#text-v5)">CURSUS</text>
  <!-- Sous-titre -->
  <text x="256" y="595" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="400" letter-spacing="6"
        fill="#4A90D9" opacity="0.6">PLATEFORME ÉDUCATIVE</text>
</svg>
