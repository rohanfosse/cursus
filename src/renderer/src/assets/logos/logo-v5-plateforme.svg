<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" fill="none">
  <!-- Logo v5 : Plateforme complète — Monogramme abouti, identité finale -->
  <defs>
    <linearGradient id="g5main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="35%" stop-color="#4A90D9"/>
      <stop offset="65%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="g5inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="g5glow" cx="50%" cy="45%" r="50%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g5text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="g5accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Ombre portée pour profondeur -->
    <filter id="shadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6D28D9" flood-opacity="0.15"/>
    </filter>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo de fond -->
  <circle cx="256" cy="260" r="220" fill="url(#g5glow)"/>

  <!-- Anneau extérieur subtil — écosystème -->
  <circle cx="256" cy="260" r="205" stroke="#4A90D9" stroke-width="1.2" fill="none" opacity="0.12"/>

  <!-- ===== MONOGRAMME C/U PRINCIPAL ===== -->
  <g filter="url(#shadow5)">
    <!-- Branche gauche : le C qui descend et forme le U -->
    <path d="M298 88
             C205 55, 90 148, 90 262
             C90 368, 160 438, 232 450
             Q256 454, 256 426
             L256 395"
          stroke="url(#g5main)" stroke-width="46" stroke-linecap="round" fill="none"/>
    <!-- Branche droite : le U qui remonte et ouvre le C -->
    <path d="M256 395
             L256 426
             Q256 454, 280 450
             C352 438, 422 368, 422 262
             C422 195, 395 145, 358 115"
          stroke="url(#g5main)" stroke-width="46" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Point de fusion C/U — coeur de la marque -->
  <circle cx="256" cy="410" r="11" fill="#A855F7" filter="url(#glow5)"/>
  <circle cx="256" cy="410" r="5" fill="white" opacity="0.9"/>

  <!-- Flux dynamiques internes — le savoir qui circule -->
  <path d="M155 210 Q256 195, 357 210" stroke="url(#g5inner)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M135 275 Q256 258, 377 275" stroke="url(#g5inner)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M155 340 Q256 323, 357 340" stroke="url(#g5inner)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Accent dynamique : trait ascendant — progression -->
  <path d="M340 350 Q365 300, 380 230 Q390 180, 370 120"
        stroke="url(#g5accent)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
  <circle cx="370" cy="118" r="5" fill="#2ECC71" opacity="0.7"/>

  <!-- 3 petits marqueurs colorés — les piliers de la plateforme -->
  <circle cx="155" cy="180" r="5" fill="#38BDF8" opacity="0.5"/>
  <circle cx="130" cy="320" r="4" fill="#A855F7" opacity="0.4"/>
  <circle cx="400" cy="330" r="4" fill="#2ECC71" opacity="0.4"/>

  <!-- ===== TYPOGRAPHIE ===== -->
  <text x="256" y="545" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="64" font-weight="800" letter-spacing="16"
        fill="url(#g5text)">CURSUS</text>
  <text x="260" y="580" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" letter-spacing="8"
        fill="#6D28D9" opacity="0.45">PLATEFORME ÉDUCATIVE</text>
</svg>
