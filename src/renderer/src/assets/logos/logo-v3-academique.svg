<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Logo v3 : Académique — Monogramme C/U avec chemin ascendant et étoile de progression -->
  <defs>
    <linearGradient id="g3a" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="g3b" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="g3arrow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
  </defs>
  <!-- Monogramme C/U — forme englobante -->
  <path d="M305 78
           C192 42, 72 135, 72 260
           C72 375, 150 448, 225 458
           Q256 462, 256 428
           L256 392"
        stroke="url(#g3a)" stroke-width="42" stroke-linecap="round" fill="none"/>
  <path d="M256 392
           L256 428
           Q256 462, 287 458
           C362 448, 440 375, 440 260
           C440 192, 412 140, 372 108"
        stroke="url(#g3a)" stroke-width="42" stroke-linecap="round" fill="none"/>
  <!-- Chemin ascendant intérieur : une ligne qui monte en zigzag comme un parcours éducatif -->
  <path d="M175 370 L220 310 L190 260 L240 200 L210 155 L270 90"
        stroke="url(#g3arrow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Étoile / diamant au sommet du chemin — objectif atteint -->
  <polygon points="270,58 280,80 304,80 285,94 292,116 270,102 248,116 255,94 236,80 260,80"
           fill="url(#g3b)" opacity="0.9"/>
  <!-- Petits jalons sur le chemin -->
  <circle cx="175" cy="370" r="6" fill="#2563EB" opacity="0.6"/>
  <circle cx="190" cy="260" r="6" fill="#4A90D9" opacity="0.7"/>
  <circle cx="210" cy="155" r="6" fill="#22D3EE" opacity="0.8"/>
  <!-- Trois points à droite : notes / évaluations -->
  <circle cx="370" cy="220" r="10" fill="#2ECC71" opacity="0.6"/>
  <circle cx="385" cy="280" r="8" fill="#4A90D9" opacity="0.5"/>
  <circle cx="375" cy="340" r="9" fill="#F59E0B" opacity="0.5"/>
</svg>
