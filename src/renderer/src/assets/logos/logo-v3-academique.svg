<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Logo v3 : Académique - C avec mortier et barres de progression -->
  <!-- Phase devoirs/notations : éducation formelle, évaluation -->
  <defs>
    <linearGradient id="arc-v3" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7EB8FF"/>
      <stop offset="50%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2e6dae"/>
    </linearGradient>
    <linearGradient id="prog1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <linearGradient id="prog2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>
  <!-- Arc du C -->
  <path d="M300 105 C190 55, 60 125, 60 256 C60 387, 190 457, 300 410"
        stroke="url(#arc-v3)" stroke-width="46" stroke-linecap="round" fill="none"/>
  <!-- Mortier de diplômé stylisé -->
  <polygon points="220,58 340,58 360,78 200,78" fill="#2e6dae"/>
  <rect x="255" y="78" width="50" height="12" rx="3" fill="#4A90D9"/>
  <line x1="280" y1="58" x2="280" y2="38" stroke="#4A90D9" stroke-width="3"/>
  <circle cx="280" cy="34" r="6" fill="#7EB8FF"/>
  <!-- Pompon et fil -->
  <path d="M280 38 Q310 30, 330 50" stroke="#7EB8FF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="332" cy="52" r="5" fill="#2ECC71"/>
  <!-- Barres de progression -->
  <!-- Barre 1 : fond + remplissage 85% -->
  <rect x="230" y="200" width="200" height="26" rx="13" fill="#1c2a3d" opacity="0.3"/>
  <rect x="230" y="200" width="170" height="26" rx="13" fill="url(#prog1)"/>
  <!-- Barre 2 : fond + remplissage 60% -->
  <rect x="210" y="285" width="210" height="26" rx="13" fill="#1c2a3d" opacity="0.3"/>
  <rect x="210" y="285" width="126" height="26" rx="13" fill="url(#prog2)"/>
  <!-- Barre 3 : fond + remplissage 40% -->
  <rect x="235" y="370" width="170" height="26" rx="13" fill="#1c2a3d" opacity="0.3"/>
  <rect x="235" y="370" width="68" height="26" rx="13" fill="#4A90D9"/>
</svg>
