<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP : 'unsafe-inline' dans style-src est nécessaire pour les styles
      dynamiques (couleurs de promo, barres de progression…).
      À durcir lors d'un refactoring CSS-variables complet (Axe 4 - suite).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        connect-src 'self' https://app.cursus.school wss://app.cursus.school https://cursus.devrohan.cloud wss://cursus.devrohan.cloud http://localhost:3001 ws://localhost:3001;
        img-src     'self' data: blob: https://app.cursus.school https://cursus.devrohan.cloud http://localhost:3001;
        media-src   'self' data: blob: https://app.cursus.school http://localhost:3001;
        font-src    'self' data:;
        frame-src   'self' blob: https://app.cursus.school http://localhost:3001;
        object-src  'self' blob: https://app.cursus.school http://localhost:3001;
        base-uri    'none';
      "
    />
    <title>Cursus</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
